# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-smartparking"
BBFILE_PATTERN_meta-smartparking = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-smartparking = "6"

LAYERDEPENDS_meta-smartparking = "core"
LAYERSERIES_COMPAT_meta-smartparking = "styhead"
